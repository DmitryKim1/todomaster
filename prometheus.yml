global:
  scrape_interval: 15s  # Как часто собирать метрики
  evaluation_interval: 15s

scrape_configs:
  # Метрики Node Exporter (системные метрики сервера)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'server'

  # Опционально: метрики самого Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']